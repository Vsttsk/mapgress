<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#059669">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text; user-select: text; }
    </style>
    <title>Монитор Лента</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Экран входа -->
    <div id="password-screen">
        <div class="auth-logo">🗺️</div>
        <h1>Монитор Лента</h1>
        <p class="auth-subtitle">Мониторинг торговых точек</p>
        <input type="password" id="password-input" placeholder="Введите пароль">
        <button onclick="checkPassword()">Войти</button>
    </div>

    <!-- Загрузка карты после логина -->
    <div id="app-loader" class="hidden">
        <span class="loader-logo">🗺️</span>
        <div class="spinner"></div>
        <p>Загрузка карты...</p>
    </div>

    <!-- Основное приложение -->
    <div id="app" style="display: none;">
        <div id="stats-bar">
            <span id="stats-summary">📊 За 14 дней: ...</span>
            <div class="stats-actions">
                <button class="btn-icon" id="editor-btn" onclick="toggleEditorMode()" title="Редактор">✏️</button>
                <button class="btn-icon" onclick="toggleDashboard()" title="Дашборд">📈</button>
                <button class="btn-icon" onclick="showCalendar()" title="Календарь">📅</button>
            </div>
            <div id="editor-bar" class="hidden">
                <div class="editor-mode-toggle">
                    <button class="toggle-btn active" id="mode-move-btn" onclick="setEditorSubMode('move')" title="Двигать маркеры">✋ Двигать</button>
                    <button class="toggle-btn" id="mode-highlight-btn" onclick="setEditorSubMode('highlight')" title="Отмечать важные ТК">🔴 Важные</button>
                </div>
                <button class="btn btn-primary" onclick="finishEditing()">Готово</button>
            </div>
        </div>

        <div id="map"></div>

        <!-- Панель ТК -->
        <div id="tk-panel" class="hidden">
            <div class="panel-handle"></div>
            <button class="btn-close" onclick="hideTKPanel()" title="Закрыть">×</button>
            <div id="tk-info"></div>
        </div>

        <!-- Дашборд -->
        <div id="dashboard" class="hidden">
            <button class="btn-close btn-close-dash" onclick="toggleDashboard()">×</button>
            <div class="dashboard-content">
                <h3>Дашборд</h3>
                <canvas id="stats-chart"></canvas>
            </div>
        </div>
    </div>

    <!-- Оверлей ожидания при сохранении -->
    <div id="loading-overlay" class="hidden">
        <div class="loading-card">
            <div class="spinner"></div>
            <p id="loading-text">Сохранение...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
